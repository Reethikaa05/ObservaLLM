---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: llm-observatory

---
# Secret for API key
apiVersion: v1
kind: Secret
metadata:
  name: observatory-secrets
  namespace: llm-observatory
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "your-key-here"

---
# PersistentVolumeClaim for SQLite
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: observatory-db-pvc
  namespace: llm-observatory
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi

---
# Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: observatory-backend
  namespace: llm-observatory
  labels:
    app: observatory-backend
spec:
  replicas: 1  # SQLite is single-node; use Postgres for multi-replica
  selector:
    matchLabels:
      app: observatory-backend
  template:
    metadata:
      labels:
        app: observatory-backend
    spec:
      containers:
        - name: backend
          image: observatory-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3001"
            - name: DB_PATH
              value: /data/observatory.db
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: observatory-secrets
                  key: ANTHROPIC_API_KEY
          volumeMounts:
            - name: db-storage
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: db-storage
          persistentVolumeClaim:
            claimName: observatory-db-pvc

---
# Backend Service
apiVersion: v1
kind: Service
metadata:
  name: observatory-backend
  namespace: llm-observatory
spec:
  selector:
    app: observatory-backend
  ports:
    - port: 3001
      targetPort: 3001
  type: ClusterIP

---
# Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: observatory-frontend
  namespace: llm-observatory
spec:
  replicas: 2
  selector:
    matchLabels:
      app: observatory-frontend
  template:
    metadata:
      labels:
        app: observatory-frontend
    spec:
      containers:
        - name: frontend
          image: observatory-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

---
# Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: observatory-frontend
  namespace: llm-observatory
spec:
  selector:
    app: observatory-frontend
  ports:
    - port: 80
      targetPort: 80
  type: LoadBalancer

---
# Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: observatory-ingress
  namespace: llm-observatory
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
spec:
  rules:
    - host: observatory.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: observatory-backend
                port:
                  number: 3001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: observatory-frontend
                port:
                  number: 80
